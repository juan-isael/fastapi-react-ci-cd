name: CICD

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run test
        working-directory: ./backend
        run: pytest

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: install dependencies
        working-directory: ./frontend
        run: npm install

      - name: build frontend
        working-directory: ./frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    
    needs: [backend-test, frontend-test]

    env:
      BACKEND_IMAGE_NAME: "my-api"
      FRONTEND_IMAGE_NAME: "my-react-app"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build backend image
        run: |
          docker build  -t ${{ secrets.DOCKERHUB_USERNAME }}/$BACKEND_IMAGE_NAME:latest \
                        -t ${{ secrets.DOCKERHUB_USERNAME }}/$BACKEND_IMAGE_NAME:${{ github.sha }} \
                        ./backend

      - name: build frontend image
        run: |
          docker build  -t ${{ secrets.DOCKERHUB_USERNAME }}/$FRONTEND_IMAGE_NAME:latest \
                        -t ${{ secrets.DOCKERHUB_USERNAME }}/$FRONTEND_IMAGE_NAME:${{ github.sha }} \
                        ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$BACKEND_IMAGE_NAME:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$BACKEND_IMAGE_NAME:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$FRONTEND_IMAGE_NAME:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$FRONTEND_IMAGE_NAME:${{ github.sha }}