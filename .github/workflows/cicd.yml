name: CICD

on:
  push:
    branches:
      - main

jobs:

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo Checkout repository
        uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: run tests
        working-directory: ./backend
        run: pytests || true



